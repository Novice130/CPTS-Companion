# Nginx configuration for CPTS Companion
# Save as: /etc/nginx/sites-available/cpts.learnnovice.com

server {
    listen 80;
    server_name cpts.learnnovice.com;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Static files served directly by nginx for performance
    location /css/ {
        alias /var/www/cpts-companion/public/css/;
    }

    location /js/ {
        alias /var/www/cpts-companion/public/js/;
    }

    location /img/ {
        alias /var/www/cpts-companion/public/img/;
    }

    location = /favicon.jpg {
        alias /var/www/cpts-companion/public/favicon.jpg;
    }
}
